<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smash 3 Sprite Tier List</title>
    <style>
        :root {
            --bg1: #0f172a;
            --bg2: #1e1b4b;
            --panel: rgba(15, 23, 42, 0.75);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --card: rgba(15, 23, 42, 0.85);
            --border: rgba(148, 163, 184, 0.28);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Trebuchet MS", Verdana, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 15% 10%, rgba(251, 191, 36, 0.12), transparent 32%),
                radial-gradient(circle at 80% 5%, rgba(56, 189, 248, 0.16), transparent 30%),
                linear-gradient(140deg, var(--bg1), var(--bg2));
            min-height: 100vh;
            padding: 28px 20px 40px;
        }

        .wrap {
            max-width: 1280px;
            margin: 0 auto;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 22px;
            backdrop-filter: blur(6px);
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.28);
        }

        h1 {
            margin: 0 0 8px;
            text-align: center;
            font-size: clamp(1.8rem, 3.6vw, 2.7rem);
            letter-spacing: 0.06em;
        }

        .sub {
            margin: 0 0 18px;
            text-align: center;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .tier {
            display: grid;
            grid-template-columns: 88px 1fr;
            gap: 14px;
            align-items: stretch;
            margin: 12px 0;
        }

        .badge {
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            letter-spacing: 0.08em;
            color: #0f172a;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.65);
            font-size: 1.3rem;
            min-height: 112px;
        }

        .op { background: linear-gradient(160deg, #fb7185, #f59e0b); }
        .s  { background: linear-gradient(160deg, #f59e0b, #facc15); }
        .a  { background: linear-gradient(160deg, #34d399, #2dd4bf); }
        .b  { background: linear-gradient(160deg, #60a5fa, #818cf8); }
        .f  { background: linear-gradient(160deg, #a78bfa, #c084fc); }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(135px, 1fr));
            gap: 12px;
            background: rgba(2, 6, 23, 0.42);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
        }

        .card {
            background: var(--card);
            border: 1px solid rgba(148, 163, 184, 0.34);
            border-radius: 10px;
            padding: 8px;
            text-align: center;
            transition: transform 120ms ease, border-color 120ms ease;
        }

        .card:hover {
            transform: translateY(-2px);
            border-color: rgba(248, 250, 252, 0.75);
        }

        .card img {
            width: 100%;
            height: 92px;
            object-fit: contain;
            display: block;
            background: rgba(2, 6, 23, 0.55);
            border-radius: 8px;
        }

        .name {
            margin-top: 7px;
            font-size: 0.84rem;
            color: #f8fafc;
            line-height: 1.2;
            min-height: 2.2em;
        }

        @media (max-width: 740px) {
            .tier {
                grid-template-columns: 1fr;
            }
            .badge {
                min-height: 56px;
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <main class="wrap">
        <h1>Smash 3 Sprite Tier List</h1>
        <p class="sub">Requested character sprite ranking by tier.</p>

        <section class="tier">
            <div class="badge op">OP</div>
            <div class="grid">
                <div class="card"><img src="assets/sprite_fazbear.png" alt="Fazbear sprite"><div class="name">Fazbear</div></div>
                <div class="card"><img src="assets/sprite_vaughan2.jpg" alt="Vaughan 2 sprite"><div class="name">Vaughan 2</div></div>
                <div class="card"><img src="assets/sprite_Sahur.jfif" alt="Sahur sprite"><div class="name">Sahur</div></div>
            </div>
        </section>

        <section class="tier">
            <div class="badge s">S</div>
            <div class="grid">
                <div class="card"><img src="assets/sprite_droid.jpg" alt="Droid sprite"><div class="name">Droid</div></div>
                <div class="card"><img src="assets/sprite_trump.jpg" alt="Trump sprite"><div class="name">Trump</div></div>
                <div class="card"><img src="assets/sprite_netanyahu.png" alt="Netanyahu sprite"><div class="name">Netanyahu</div></div>
                <div class="card"><img src="assets/sprite_kirky.png" alt="Kirky sprite"><div class="name">Kirky</div></div>
            </div>
        </section>

        <section class="tier">
            <div class="badge a">A</div>
            <div class="grid">
                <div class="card"><img src="assets/sprite_epstein.png" alt="Epstein sprite"><div class="name">Epstein</div></div>
                <div class="card"><img src="assets/sprite_speed.jpg" alt="Speed sprite"><div class="name">Speed</div></div>
                <div class="card"><img src="assets/sprite_diddy.jpg" alt="Diddy sprite"><div class="name">Diddy</div></div>
                <div class="card"><img src="assets/sprite_kiddo.jpg" alt="Kiddo sprite"><div class="name">Kiddo</div></div>
                <div class="card"><img src="assets/sprite_aru.png" alt="Aru sprite"><div class="name">Aru</div></div>
                <div class="card"><img src="assets/sprite_bomber.png" alt="Bomber sprite"><div class="name">Bomber</div></div>
            </div>
        </section>

        <section class="tier">
            <div class="badge b">B</div>
            <div class="grid">
                <div class="card"><img src="assets/sprite_metabot.png" alt="Metabot sprite"><div class="name">Metabot</div></div>
                <div class="card"><img src="assets/sprite_speedster.jpg" alt="Nutsak sprite"><div class="name">Nutsak</div></div>
                <div class="card"><img src="assets/sprite_grappler.jpg" alt="Frankie sprite"><div class="name">Frankie</div></div>
                <div class="card"><img src="assets/sprite_zoner.png" alt="Slaveish sprite"><div class="name">Slaveish</div></div>
                <div class="card"><img src="assets/sprite_brawler.jpg" alt="Lazer sprite"><div class="name">Lazer</div></div>
            </div>
        </section>

        <section class="tier">
            <div class="badge f">F</div>
            <div class="grid">
                <div class="card"><img src="assets/sprite_vaughan1.PNG" alt="Vaughan 1 sprite"><div class="name">Vaughan 1</div></div>
            </div>
        </section>
    </main>
</body>
</html>
